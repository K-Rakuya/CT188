<!DOCTYPE html>
<html lang="vi-vn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drite - Account Settings</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/pages/home/home.css">
    <link rel="stylesheet" href="/pages/Account/account.css">
    <script src="/pages/Account/account.js" defer></script>
</head>
<body>
    <header id="header" class="flex-center">
        <nav class="flex-center nav-floatbar-background" id="nav">
            <div id="nav-left"><a href="/index.html"><img src="/assets/Logos/logo.png" alt="Logo" id="nav-logo"></a>
            </div>
            <div id="nav-center">
                    <a href="/index.html">Home</a>
                    <a href="">Product</a>
                    <a href="">Promotion</a>
                    <a href="">Information</a>
            </div>
            <div id="nav-right" class="flex-center gap-16">
                <div id="searchContainer" class="flex-center gap-8">
                    <form id="searchForm" action="">
                        <input id="searchBox" class="radius-all-sm" type="search">
                    </form>
                    <button id="searchBtn" type="submit" form="searchForm"><img src="/assets/icons/search.png"
                            alt="searchBtn"></button>
                </div>
                <button id="button-card" class="flyIn hidden"><img id="button-cart_img"
                        src="/assets/icons/shopping-bag.png" alt=""></button>
                <div id="login-container" class="flex-center gap-12">
                    <a class="relative" href="" id="login">Login</a>
                    <a class="relative" href="" id="register">Register</a>
                </div>
                <div id="avatar" class="flyIn hidden">
                    <div id="avatar-wrapper">
                        <a href="/pages/Account/account.html"><img src="/assets/Avatar/avatar.png" alt="Avatar"></a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div id="profile">
            <div id="profile-header">
                <img id="profile-banner-img" src="/assets/data/Account/Banner/banner.png" alt="Banner">
                <div id="user-overlay-info" class="flex gap-24">
                    <div id="avatar-container">
                        <img src="/assets/Avatar/avatar.png" alt="User Avatar">
                    </div>
                    <div id="short-info">
                        <h1>K.Rakuya</h1>
                        <h2>@k.rakuya</h2>
                        <p>Graphic Designer & Developer</p>
                    </div>
                </div>
            </div>

            <div id="profile-content">
                <form action="" id="user-information-form">
                    <h2 class="section-title">Account Settings</h2>
                    <div class="glass-box">
                        <div class="info-row">
                            <label for="username">Username</label>
                            <input id="username" type="text" placeholder="Tên người dùng">
                        </div>
                        <div class="info-row">
                            <label for="phone">Số điện thoại</label>
                            <input id="phone" type="text" placeholder="0123 456 789">
                        </div>
                        <div class="info-row">
                            <label for="email">Email</label>
                            <input id="email" type="email" placeholder="email@example.com">
                        </div>
                    </div>

                    <h2 class="section-title">Address Settings</h2>
                    <div class="glass-box">
                        <div class="info-row address-row">
                            <label for="address_input">Địa chỉ chính</label>
                            <input id="address_input" type="text" placeholder="Địa chỉ của bạn">
                            <div class="actions">
                                <input type="radio" name="address_primary" id="main-addr-check" checked>
                                <label class="radio-mark" for="main-addr-check"></label>
                                <button type="button" class="btn-delete">🗑</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex-center" style="margin-top: 20px;">
                        <button type="submit" class="btn-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
