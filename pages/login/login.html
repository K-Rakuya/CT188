<!DOCTYPE html>
<html lang="vi">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login</title>
   <link rel="stylesheet" href="css/style.css">
</head>
   <body>
      <main class="container">
         <!-- FORM LOGIN -->
         <section class="flex-center container-form">
            <form action="" enctype="application/x-www-form-urlencoded" class="form gap-20 flex-colum form-login">
               <h1 class="title bold">Login</h1>

               <div class="input-user input relative">
                  <label for="username" class="sr-only">Username or SĐT</label>
                  <input type="text" id="username" class="username" required placeholder="Username or SĐT">
                  <i class="fa-solid fa-user" aria-hidden="true"></i>
               </div>   

               <div class="input-password input relative">
                  <label for="password" class="sr-only">Password</label>
                  <input type="password" id="password" class="password" required placeholder="Password">
                  <i class="fa-solid fa-lock" style="cursor: pointer;" id="togglePassword" aria-hidden="true"></i>
               </div>   
               
               <div class="forgot-password">
                  <a class="a-forgot" href="#">Quên Mật Khẩu</a>
               </div>
               
               <button id="login" type="submit" class="btn btn-login">Login</button>

               <div class="no-account">
                  <span>Chưa có tài khoản? </span>
                  <a class="a-account" href="../register/register.html">Đăng ký ngay</a>
               </div>

               <div class="platform-other">
                  <p>or Login With Social platforms</p>
               </div>

               <div class="flex gap-10 platform-item platform-login">
                  <a href="#" class="item" aria-label="Login with Google"><i class="fa-brands fa-google"></i></a>
                  <a href="#" class="item" aria-label="Login with Facebook"><i class="fa-brands fa-facebook"></i></a>
                  <a href="#" class="item" aria-label="Login with Tiktok"><i class="fa-brands fa-tiktok"></i></a>
                  <a href="#" class="item" aria-label="Login with Apple"><i class="fa-brands fa-apple"></i></a>
               </div>
            </form> 
         </section>

         <!-- IMG PANEL -->
         <section class="container-panel">
            <img src="img/d94327edc7ae4b131845767888022b35.jpg" alt="Strawberry Drinks Promotion">
         </section>

      </main>
      <script src="js/login.js" type="module"></script>
   </body>
</html>
