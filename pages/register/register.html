<!DOCTYPE html>
<html lang="vi"> <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Đăng Ký - Refreshing Journey</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <main class="container">
      <!-- FORM -->
      <section class="flex-center container-form">
         <form class="form gap-20 flex-collum form-register">
            <h1 class="title bold">Đăng Ký</h1>

            <div class="input-user input relative">
               <label for="username" class="sr-only">Tên đăng nhập</label>
               <input type="text" id="username" class="username" required 
                      placeholder="Username" autocomplete="username">
               <i class="fa-solid fa-user" aria-hidden="true"></i>
            </div>   

            <div class="input-email input relative">
               <label for="contact" class="sr-only">Email hoặc Số điện thoại</label>
               <input type="text" id="contact" class="username" required 
                      placeholder="Email or Number Phone" autocomplete="email">
               <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            </div>   

            <div class="input-password input relative">
               <label for="password" class="sr-only">Mật khẩu</label>
               <input type="password" id="password" class="password" required 
                      placeholder="Password" autocomplete="new-password">
               <i class="fa-solid fa-lock" style="cursor: pointer;" id="togglePassword" aria-hidden="true"></i>
            </div>   

            <div class="has-Passwd">
               <span>Đã có tài khoản? </span>
               <a class="a-hasPasswd" href="../login/login.html">Đăng Nhập Ngay</a>
            </div>

            <button type="submit" class="btn btn-register">Register</button>

            <div class="platform-other">
               <p>or Login With Social platforms</p>
            </div>

            <div class="flex gap-10 platform-item platform-register">
               <a href="#" class="item" aria-label="Đăng ký với Google"><i class="fa-brands fa-google"></i></a>
               <a href="#" class="item" aria-label="Đăng ký với Facebook"><i class="fa-brands fa-facebook"></i></a>
               <a href="#" class="item" aria-label="Đăng ký với Tiktok"><i class="fa-brands fa-tiktok"></i></a>
               <a href="#" class="item" aria-label="Đăng ký với Apple"><i class="fa-brands fa-apple"></i></a>
            </div>
         </form> 
      </section>
      <!-- PROMOTION -->
      <section class="container-panel gap-10 flex-center flex-collum">
         <h2 class="title">Start Your Refreshing Journey!</h2>
         <p class="content">Trở thành thành viên để nhận ngay ưu đãi "Mua 1 Tặng 1" 
         và cập nhật những món signature mới nhất từ chúng mình</p>
      </section>   
   </main>

   <script src="js/register.js" type="module"></script>
</body>
</html>
