<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Coffee Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="./Header/Logo_Text.png" alt="Logo" class="logo-img">
            <h1>MY COFFEE</h1>
        </div>

        <div class="nav">
            <button class="burger-menu" style="background-color: black; border: none;">
                <i style="color: white;" class="fa-solid fa-bars"></i>
            </button>

            <div class="search-bar">
                <button class="button search-button" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                <input class="search-input" type="text" placeholder="Tìm kiếm sản phẩm...">
            </div>
            <div class="features">
                <div class="features-list">
                    <a class="feature" href="#">Trang chủ</a>
                    <a class="feature" href="#">Sản phẩm</a>
                    <a class="feature" href="#">Giỏ hàng</a>
                </div>
                <a class="user-cart" href="/Register/register.html"> <img src="./Header/USER_ICON.svg" alt="USER" style="height: 30px;object-fit: cover;"> </a>
            </div>
        </div>
            
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h3>Danh mục</h3>
            <ul>
                <li><a href="#coffee-products">Cafe</a></li>
                <li><a href="#tea-products">Trà</a></li>
                <li><a href="#freeze">Freeze</a></li>
            </ul>
        </aside>

        <!-- PRODUCT AREA -->
        <main class="products">

            <!-- CAFE -->
            <section id="coffee-products">
                <h2>Cafe</h2>
                <div class="product-grid coffee-list">
                    <!-- Sản phẩm sẽ được render ở đây bởi JavaScript -->
                </div>
                <!-- <button class="more less"> More </button> -->
            </section>

            <!-- TRA -->
            <section id="tea-products">
                <h2>Trà</h2>
                <div class="product-grid tea-list">
                    <!-- Sản phẩm sẽ được render ở đây bởi JavaScript -->
                </div>
            </section>

            <!-- FREEZE -->
            <section id="freeze">
                <h2>Freeze</h2>
                <div class="product-grid freeze-list">
                    <!-- Sản phẩm sẽ được render ở đây bởi JavaScript -->

                </div>
            </section>

        </main>
    </div>


    <footer class="footer-page">
        <p style="display: block; width: 100%; text-align: center;">&copy; 2024 My Coffee. All rights reserved.</p>
    </footer>
    <script src="./Tea/read_data_tea.js"></script>
    <script src="./Cafe/read_data_coffee.js"></script>
    <script src="/ShowProduct/main.js"></script>
    <script src="./Nav/nav.js"></script>
</body>
</html>
