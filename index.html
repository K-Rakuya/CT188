<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Coffee Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <a href="#" class="logo">
            <img src="./Header/Logo_Text.png" alt="Logo" class="logo-img">
            <h1 style="color: white;">MIXI COFFEE</h1>
        </a>

        <div class="nav">
            <button class="burger-menu" style="background-color: black; border: none;">
                <i style="color: white;" class="fa-solid fa-bars"></i>
            </button>

            <div class="container-search-bar">
                <div class="search-bar">
                    <button class="button search-button" type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input id="search-product" class="search-input" type="text" placeholder="Tìm kiếm...">
                </div>
            </div>
            
            <div class="features">
                <div class="features-list">
                    <a href="#" class="feature">Trang chủ</a>
                    <a href="#" class="feature">Sản phẩm</a>
                    <a href="#" class="feature">Giỏ hàng</a>
                    <a href="#" class="feature">Đăng Ký</a>
                    <a href="#" class="feature">Đăng Nhập</a>
                    <a href="#" class="feature">Tin tức</a>
                </div>
                <a class="user-cart" href="#"> 
                    <img src="./Header/USER_ICON.svg" alt="USER" style="height: 30px;object-fit: cover;"> 
                </a>
            </div>
        </div>
            
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h3>Danh mục</h3>
            <ul>
                <li><a href="#coffee-products">Cafe</a></li>
                <li><a href="#tea-products">Trà</a></li>
                <li><a href="#freeze">Freeze</a></li>
            </ul>
        </aside>

        <!-- PRODUCT AREA -->
        <main class="products">

            <!-- CAFE -->
            <section class="products-list" id="coffee-products">
                <div class="title-product">
                    <h2>Cafe</h2>
                </div>
                <div class="product-grid collapsed coffee-list">
                    <!-- Sản phẩm sẽ được render ở đây bởi JavaScript -->
                </div>
                <button class="button-show-pd">
                    <span class="arrow">▼</span>
                </button>
            </section>

            <!-- TRA -->
            <section class="products-list" id="tea-products">
                <div class="title-product">
                    <h2>Trà</h2>
                </div>
                <div class="product-grid collapsed tea-list">
                    <!-- Sản phẩm sẽ được render ở đây bởi JavaScript -->
                </div>
                <button class="button-show-pd">
                    <span class="arrow">▼</span>
                </button>
            </section>

            <!-- FREEZE -->
            <section class="products-list" id="freeze">
                <div class="title-product">
                    <h2>Freeze</h2>
                </div>
                <div class="product-grid collapsed freeze-list">
                    <!-- Sản phẩm sẽ được render ở đây bởi JavaScript -->

                </div>
                <button class="button-show-pd"> 
                    <span class="arrow">▼</span>
                </button>
            </section>
            <form id="order-form">
                <div class="modal">
                    <div class="title-option">
                        <h2 style="margin: 0;">Chọn tùy chọn</h2>
                    </div>
                    <div class="img-order-form">
                    </div>
                    <div class="customization">
                        <div class="option number">   
                            <label>Số lượng:</label>
                            <input style="padding-left: 10px;" name="quantity" type="number" value="1" min="1">
                        </div>
                        <div class="option sugar">
                            <label>Đường:</label>
                            <select name="sugar">
                                <option>100%</option>
                                <option>70%</option>
                                <option>50%</option>
                                <option>Không đường</option>
                            </select>
                        </div>
                        <div class="option ice">
                            <label>Đá:</label>
                            <select name="ice">
                                <option>Bình thường</option>
                                <option>Ít đá</option>
                                <option>Không đá</option>
                            </select>
                        </div>
                    </div>
                    <div class="container-btn">
                        <button type="submit" id="confirmBtn">Xác nhận</button>
                        <button type="button" id="closeBtn">Hủy</button>
                    </div>
                </div>
            </form>

        </main>
    </div>


    <footer class="footer-page">
        <div class="information-footer grid-footer">
            <div class="brand-footer">
                <div class="container-brand">
                    <a href="#" class="logo logo-footer">
                        <img src="./Header/Logo_Text.png" alt="Logo" class="logo-img footer-logo-img">
                        <h1 style="color: white;">MIXI COFFEE</h1>
                    </a>
                    <h3>THƯƠNG HIỆU CÀ PHÊ CHẤT LƯỢNG CAO</h3>
                </div>
            </div>
            <div class="social-footer">
                <div class="container-social">
                    <h3>LIÊN HỆ VỚI CHÚNG TÔI</h3>
                    <div class="social-account">
                        <a href="#"><i style="color: blue;" class="fa-brands fa-facebook"></i></a>
                        <a href="#"><i style="color: red;" class="fa-brands fa-instagram"></i></a>
                        <a href="#"><i style="color: white;" class="fa-brands fa-x-twitter"></i></a>
                        <!-- <a href="#"><i style="color: red;" class="fa-brands fa-youtube"></i></a> -->
                    </div>
                </div>
            </div>
            <div class="support-footer">
                <div class="container-support">
                    <h3>HỖ TRỢ KHÁCH HÀNG</h3>
                    <div class="number-connect">
                        <h3>Hotline:</h3>
                        <a href="#">0123456789</a>
                    </div>
                </div>
            </div>
        </div>
        <p style="display: block; width: 100%; text-align: center;">&copy; 2024 My Coffee. All rights reserved.</p>
    </footer>

    <script type="module" src="./Cafe/read_data_coffee.js"></script>
    <script type="module" src="./Tea/read_data_tea.js"></script>
    <script type="module" src="./Freeze/read_data_freeze.js"></script>
    <script type="module" src="./Nav/nav.js"></script>
    <script>
        var order_table = document.querySelector("#order-form");
        var close_btn = order_table.querySelector("#closeBtn");
        close_btn.addEventListener("click", ()=>{
          order_table.classList.toggle("toggle");
        })
    </script>
</body>
</html>
