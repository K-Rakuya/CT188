<!DOCTYPE html>
<html lang="vi-vn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drite - Mixi Coffee</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="pages/home/home.css">
    <script src="pages/home/home.js" defer></script>
    <script src="js/components/nav.js" defer></script>
</head>
<body>
    <header id="header" class="flex-center">
        <nav class="flex-center nav-floatbar-background" id="nav">
            <div id="nav-left">
                <a href="/index.html"><img src="/assets/Logos/logo.png" alt="Logo" id="nav-logo"></a>
            </div>
            <div id="nav-center">
                <a href="/index.html">Home</a>
                <a href="/pages/products/products.html">Products</a>
                <a href="/pages/promotion/promotion.html">Promotion</a>
                <a href="/pages/information/information.html">Information</a>
            </div>
            <div id="nav-right" class="flex-center gap-16">
                <div id="searchContainer" class="flex-center gap-8">
                    <form id="searchForm" action="">
                        <input id="searchBox" class="radius-all-sm" type="search">
                    </form>
                    <button id="searchBtn" type="submit" form="searchForm">
                        <img src="/assets/icons/search.png" alt="searchBtn">
                    </button>
                </div>
                <button id="button-card" class="flyIn hidden">
                    <img id="button-cart_img" src="/assets/icons/shopping-bag.png" alt="">
                </button>
                <div id="login-container" class="flex-center gap-12">
                    <a class="relative" href="" id="login">Login</a>
                    <a class="relative" href="" id="register">Register</a>
                </div>
                <div id="avatar" class="flyIn hidden">
                    <div id="avatar-wrapper" style="position: relative;">
                        <a href="/pages/Account/account.html"><img src="/assets/Avatar/avatar.png" alt="Avatar"></a>
                        <div id="avatar-dropdown" class="dropdown-menu">
                            <a href="/pages/Account/account.html" class="dropdown-item">Profile</a>
                            <a href="#" id="logout-btn" class="dropdown-item text-danger">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main id="main" class="flex-center flex-col row-gap">
        <div id="main-banner-wrapper" class="radius-all-md flyIn">
            <div id="banner-item" class="gap-16"></div>
            <div class="banner-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div id="main-banner-overlay"></div>
        </div>
        <div id="toolBar" class="width-full flex gap-12">
            <img src="/assets/icons/menu.png" alt="">
            <img id="filterPannel" src="/assets/icons/filter.png" alt="">
        </div>
        <div id="listItem" class="width-full flex gap-8">
            <div id="main-grid-items" class="grid-auto-fit grid-center"></div>
        </div>
    </main>
</body>
</html>
